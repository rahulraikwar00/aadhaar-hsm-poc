      <stop offset="0%" style="stop-color:#4477aa"/>
      <stop offset="100%" style="stop-color:#225588"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
